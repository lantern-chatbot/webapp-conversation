    '}',
    '#ltn-chat-panel.is-open{ display:flex; }',
    '#ltn-chat-panel iframe{',
    '  flex:1; width:100%; border:none;',
    '}',
    '',
    '@keyframes ltn-rise{',
    '  from{opacity:0;transform:translateY(14px) scale(.96)}',
    '  to{opacity:1;transform:translateY(0) scale(1)}',
    '}',
    '@keyframes ltn-pulse{',
    '  0%{box-shadow:0 0 0 0 rgba(232,98,10,.42)}',
    '  70%{box-shadow:0 0 0 16px rgba(232,98,10,0)}',
    '  100%{box-shadow:0 0 0 0 rgba(232,98,10,0)}',
    '}',
    '',
    '@media(max-width:480px){',
    '  #ltn-chat-panel{',
    '    bottom:0; right:0; left:0; top:0;',
    '    width:100%; height:100%; max-height:100%; max-width:100%;',
    '    border-radius:0;',
    '  }',
    '  #ltn-chat-launcher{ bottom:16px; right:16px; width:56px; height:56px; }',
    '  #ltn-chat-launcher img{ width:26px; }',
    '  #ltn-chat-greet{ bottom:82px; right:16px; }',
    '}',
  ].join('\n');
  document.head.appendChild(style);

  // --- Chat panel ---
  var panel = document.createElement('div');
  panel.id = 'ltn-chat-panel';
  panel.innerHTML = '<iframe src="' + CHAT_URL + '" title="LANTERN AI \u30b3\u30f3\u30b7\u30a7\u30eb\u30b8\u30e5" loading="lazy"></iframe>';
  document.body.appendChild(panel);

  // --- Launcher button ---
  var btn = document.createElement('button');
  btn.id = 'ltn-chat-launcher';
  btn.setAttribute('aria-label', '\u30c1\u30e3\u30c3\u30c8\u3092\u958b\u304f');
  btn.innerHTML = '<img src="' + LOGO_WHITE + '" alt="">'
    + '<svg class="ltn-close-icon" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.4" stroke-linecap="round"><path d="M18 6 6 18M6 6l12 12"/></svg>';
  document.body.appendChild(btn);

  var isOpen = false;
  btn.addEventListener('click', function(){
    isOpen = !isOpen;
    panel.classList.toggle('is-open', isOpen);
    btn.classList.toggle('is-open', isOpen);
    if(isOpen){ btn.style.animation = 'none'; }
    else { btn.style.animation = ''; }
  });

  // pulse animation after greeting
  setTimeout(function(){ btn.style.animation = 'ltn-pulse 2.6s infinite'; }, 3000);
})();
<\/script>
